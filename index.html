 "type": "成语"}, {"id": "成语:茂林修竹", "label": "茂林修竹", "pinyin": "mào lín xiū zhú", "meaning": "修长。茂密高大的树林竹林。", "type": "成语"}, {"id": "成语:破竹建瓴", "label": "破竹建瓴", "pinyin": "pò zhú jiàn líng", "meaning": "势如破竹，高屋建瓴。比喻居高临下，所向无敌。", "type": "成语"}, {"id": "成语:破竹之势", "label": "破竹之势", "pinyin": "pò zhú zhī shì", "meaning": "比喻节节胜利，毫无阻碍。", "type": "成语"}, {"id": "成语:势如劈竹", "label": "势如劈竹", "pinyin": "shì rú pī zhú", "meaning": "比喻节节胜利，毫无阻碍。见势如破竹”。", "type": "成语"}, {"id": "成语:势如破竹", "label": "势如破竹", "pinyin": "shì rú pò zhú", "meaning": "势气势，威力。形势就象劈竹子，头上几节破开以后，下面各节顺着刀势就分开了。比喻节节胜利，毫无阻碍。", "type": "成语"}, {"id": "成语:胸无成竹", "label": "胸无成竹", "pinyin": "xiōng wú chéng zhú", "meaning": "指心中没有完整的谋划打算。", "type": "成语"}, {"id": "成语:胸有成竹", "label": "胸有成竹", "pinyin": "xiōng yǒu chéng zhú", "meaning": "原指画竹子要在心里有一幅竹子的形象◇比喻在做事之前已经拿定主意。", "type": "成语"}, {"id": "成语:易如破竹", "label": "易如破竹", "pinyin": "yì rú pò zhú", "meaning": "像劈竹子那样容易。形容办事顺利，毫无阻碍。", "type": "成语"}, {"id": "成语:竹报平安", "label": "竹报平安", "pinyin": "zhú bào píng ān", "meaning": "比喻平安家信。", "type": "成语"}, {"id": "成语:竹马之交", "label": "竹马之交", "pinyin": "zhú mǎ zhī jiāo", "meaning": "竹马小孩当马骑的竹竿。童年时代就要好的朋友。", "type": "成语"}, {"id": "成语:竹马之友", "label": "竹马之友", "pinyin": "zhú mǎ zhī yǒu", "meaning": "指儿童时期的朋友。", "type": "成语"}, {"id": "成语:安车蒲轮", "label": "安车蒲轮", "pinyin": "ān chē pú lún", "meaning": "让被征请者坐在安车上，并用蒲叶包着车轮，以便行驶时车身更为安稳。表示皇帝对贤能者的优待。", "type": "成语"}, {"id": "成语:束蒲为脯", "label": "束蒲为脯", "pinyin": "shù pú wéi pú", "meaning": "将捆束的蒲柳说成肉脯。指有意颠倒黑白，混淆是非。", "type": "成语"}, {"id": "成语:姜桂之性", "label": "姜桂之性", "pinyin": "jiāng guì zhī xìng", "meaning": "生姜和肉桂愈久愈辣。比喻年纪越大性格越耿直。", "type": "成语"}, {"id": "成语:蕙心纨质", "label": "蕙心纨质", "pinyin": "huì xīn wán zhì", "meaning": "心灵如蕙草芬芳，品质似纨素洁白。比喻品行高洁。", "type": "成语"}, {"id": "成语:芝焚蕙叹", "label": "芝焚蕙叹", "pinyin": "zhī fén huì tàn", "meaning": "芝、蕙同为香草名；焚烧。芝草被焚，蕙草伤叹。比喻因同类遭到不幸而悲伤。", "type": "成语"}, {"id": "成语:吹气如兰", "label": "吹气如兰", "pinyin": "chuī qì rú lán", "meaning": "气息象兰花那样香。形容美女的呼吸。也用于形容文词华美。", "type": "成 。", "type": "成语"}, {"id": "成语:桑户棬枢", "label": "桑户棬枢", "pinyin": "sāng hù juàn shū", "meaning": "以桑枝为门，木条为枢。形容居处简陋，家境贫寒。", "type": "成语"}, {"id": "成语:桑落瓦解", "label": "桑落瓦解", "pinyin": "sāng luò wǎ jiě", "meaning": "象桑叶枯落，屋瓦解体。形容事势败坏到不可收拾的地步。", "type": "成语"}, {"id": "成语:桑枢畒牖", "label": "桑枢畒牖", "pinyin": "sāng shū wèng yǒu", "meaning": "以桑木为门轴，以破畒为窗口。形容贫寒之家。", "type": "成语"}, {"id": "成语:桑枢韦带", "label": "桑枢韦带", "pinyin": "sāng shū wéi dài", "meaning": "桑枢，桑木的门轴。韦带，无饰的皮革腰带◇以之形容贫家寒士。", "type": "成语"}, {"id": "成语:桑枢瓮牖", "label": "桑枢瓮牖", "pinyin": "sāng shū wěng yǒu", "meaning": "枢门上的转轴；瓮牖简陋的窗户。用桑树做门轴，用瓦罐做窗户，比喻贫苦之家。", "type": "成语"}, {"id": "成语:桑土绸缪", "label": "桑土绸缪", "pinyin": "sāng tǔ chóu miù", "meaning": "比喻勤于经营，防患未然。", "type": "成语"}, {"id": "成语:桑土之防", "label": "桑土之防", "pinyin": "sāng tǔ zhī fáng", "meaning": "比喻防患于未然。", "type": "成语"}, {"id": "成语:桑土之谋", "label": "桑土之谋", "pinyin": "sāng tǔ zhī móu", "meaning": "比喻勤于经营谋划，防患未然。", "type": "成语"}, {"id": "成语:桑荫不徙", "label": "桑荫不徙", "pinyin": "sāng yīn bù xǐ", "meaning": "指人之意气相投，相知无须时日长久。亦指时间短暂。", "type": "成语"}, {"id": "成语:桑荫未移", "label": "桑荫未移", "pinyin": "sāng yīn wèi yí", "meaning": "指人之意气相投，相知无须时日长久。亦指时间短暂。同桑荫不徙”。", "type": "成语"}, {"id": "成语:田月桑时", "label": "田月桑时", "pinyin": "tián yuè sāng shí", "meaning": "泛指农忙季节。", "type": "成语"}, {"id": "成语:指桑骂槐", "label": "指桑骂槐", "pinyin": "zhǐ sāng mà huái", "meaning": "指着桑树骂槐树。比喻表面上骂这个人，实际上是骂那个人。", "type": "成语"}, {"id": "成语:指桑说槐", "label": "指桑说槐", "pinyin": "zhǐ sāng shuō huái", "meaning": "比喻明指此而暗骂彼。同指桑骂槐”。", "type": "成语"}, {"id": "成语:桑户蓬枢", "label": "桑户蓬枢", "pinyin": "sāng hù péng shū", "meaning": "编桑枝为门，立蓬条为枢。形容家境贫穷。", "type": "成语"}, {"id": "成语:桑弧蒿矢", "label": "桑弧蒿矢", "pinyin": "sāng hú hāo shǐ", "meaning": "指行桑弧蓬矢之礼以励志。蒿，蓬蒿。", "type": "成语"}, {"id": "成语:东隅已逝，桑榆非晚", "label": "东隅已逝，桑榆非晚", "pinyin": "dōng yú yǐ shì，sāng yú fēi wǎn", "meaning": "东隅指日出处，表示早年。桑榆指日落处，表示晚年。早年的时光消逝，如果珍惜时光，发愤图强，晚年并不晚。", "type": "成语"}, {"id": "成语:景入桑榆", "label": "景入桑榆", "pinyin": "jǐng rù sāng yú", "meaning": "比 // 节点类型样式配置
const TYPE_CONFIG = {
  '门':   { color: '#ff7b72', size: 30, order: 0, shape: 'circle' },
  '纲':   { color: '#ffa657', size: 25, order: 1, shape: 'circle' },
  '亚纲': { color: '#f0c64a', size: 20, order: 2, shape: 'circle' },
  '目':   { color: '#66bb6a', size: 17, order: 3, shape: 'circle' },
  '科':   { color: '#58a6ff', size: 14, order: 4, shape: 'circle' },
  '属':   { color: '#bc8cff', size: 12, order: 5, shape: 'circle' },
  '植物': { color: '#e85d9d', size: 11, order: 6, shape: 'flower' },    // 花朵形状
  '成语': { color: '#39F7CD', size: 8,  order: 7, shape: 'rect' }       // 矩形
};
const EDGE_COLOR = { '属于': '#5c6e6b', '归属于': '#3b4b54', '含有植物': '#2e7d64' };

// 构建邻接表用于高亮
let adjMap = {};
function buildAdjacency() {
  if (!GRAPH_DATA) return;
  adjMap = {};
  GRAPH_DATA.edges.forEach(e => {
    if (!adjMap[e.source]) adjMap[e.source] = [];
    if (!adjMap[e.target]) adjMap[e.target] = [];
    adjMap[e.source].push({ neighbor: e.target, rel: e.relation });
    adjMap[e.target].push({ neighbor: e.source, rel: e.relation });
  });
}

let simulation, svg, g, zoom;
let visibleTypes = new Set(Object.keys(TYPE_CONFIG));
let currentHighlightId = null;

// 辅助函数：生成花朵路径 (基于坐标,半径)
function drawFlower(ctx, cx, cy, r) {
  // 返回一朵六瓣花朵的 path 字符串，直接返回简易繁花路径
  const petalCount = 6;
  let path = `M ${cx} ${cy - r * 0.9} `;
  for (let i = 0; i < petalCount; i++) {
    let angle = (i * 2 * Math.PI / petalCount) - Math.PI/2;
    let x1 = cx + Math.cos(angle) * r * 1.05;
    let y1 = cy + Math.sin(angle) * r * 1.05;
    let ctrlX = cx + Math.cos(angle + 0.5) * r * 1.6;
    let ctrlY = cy + Math.sin(angle + 0.5) * r * 1.6;
    let x2 = cx + Math.cos(angle + 0.8) * r * 0.8;
    let y2 = cy + Math.sin(angle + 0.8) * r * 0.8;
    if (i === 0) path += `Q ${ctrlX} ${ctrlY}, ${x2} ${y2}`;
    else path += ` Q ${ctrlX} ${ctrlY}, ${x2} ${y2}`;
  }
  path += ` Z`;
  return path;
}

// 绘制图形并返回渲染使用的自定义attr，为了简单在node中直接动态生成path或矩形
function applyCustomShape(selection, nodeData) {
  const cfg = TYPE_CONFIG[nodeData.type];
  const r = cfg?.size || 8;
  const color = cfg?.color || '#aaa';

  // 关键修复：让所有内部图形不拦截鼠标事件
  const noPointerEvents = { 'pointer-events': 'none' };

  if (cfg?.shape === 'flower') {
    selection.append('path')
      .attr('d', function(d) { 
        const r = cfg.size;
        let path = `M 0 ${-r}`;
        for (let i = 1; i <= 6; i++) {
          let a = i * Math.PI / 3;
          let x = r * Math.sin(a);
          let y = -r * Math.cos(a);
          path += ` Q ${x*0.6} ${y*0.6} ${x} ${y}`;
        }
        return path + ' Z';
      })
      .attr('fill', color)
      .attr('stroke', '#fff')
      .attr('stroke-width', 0.8)
      .attr(noPointerEvents);
    selection.append('circle')
      .attr('r', r * 0.35)
      .attr('fill', '#ffd966')
      .attr(noPointerEvents);
  }
  else if (cfg?.shape === 'rect') {
    // 成语矩形，带微圆角
    selection.append('rect')
      .attr('x', -r)
      .attr('y', -r * 0.8)
      .attr('width', r * 2)
      .attr('height', r * 1.6)
      .attr('rx', 4)
      .attr('fill', color)
      .attr('stroke', '#2a2f3a')
      .attr('stroke-width', 1)
      .attr(noPointerEvents);
  } else {
    selection.append('circle')
      .attr('r', r)
      .attr('fill', color)
      .attr('stroke', '#ffffff55')
      .attr('stroke-width', 1)
      .attr(noPointerEvents);
  }
}

// 渲染图谱
function renderGraph() {
  if (!GRAPH_DATA) return;
  buildAdjacency();
  g.selectAll('*').remove();
  
  const filteredNodes = GRAPH_DATA.nodes.filter(n => visibleTypes.has(n.type));
  const nodeIds = new Set(filteredNodes.map(n => n.id));
  const filteredEdges = GRAPH_DATA.edges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
  
  let nodes = filteredNodes.map(n => ({...n}));
  let edges = filteredEdges.map(e => ({...e}));
  
  // 给节点赋初始位置 (按层级分散)
  const width = window.innerWidth, height = window.innerHeight;
  nodes.forEach(n => {
    const cfg = TYPE_CONFIG[n.type];
    const rad = (cfg?.order || 4) * 75 + 40;
    const angle = Math.random() * Math.PI * 2;
    n.x = width/2 + rad * Math.cos(angle);
    n.y = height/2 + rad * Math.sin(angle);
  });
  
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(d => {
      const sOrd = TYPE_CONFIG[d.source.type]?.order || 5;
      const tOrd = TYPE_CONFIG[d.target.type]?.order || 5;
      return Math.abs(sOrd - tOrd) === 0 ? 50 : Math.abs(sOrd - tOrd) * 38 + 40;
    }).strength(0.55))
    .force('charge', d3.forceManyBody().strength(d => {
      return TYPE_CONFIG[d.type]?.order <= 2 ? -350 : TYPE_CONFIG[d.type]?.order <= 4 ? -160 : -30;
    }))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide(d => (TYPE_CONFIG[d.type]?.size || 8) + 6))
    .alphaDecay(0.028);

  // 连线
  const link = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(edges)
    .join('line')
    .attr('class', 'link')
    .attr('stroke', d => EDGE_COLOR[d.relation] || '#4a5b6e')
    .attr('stroke-width', d => d.relation === '含有植物' ? 1.2 : 1.8);
  
  // 节点组
  const nodeGroup = g.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e,d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }))
   .on('click', function(event, d) { 
  event.stopPropagation(); 
  showInfo(d); 
  highlightNode(d.id); 
  ensureNodeVisible(d); 
});
  
  // 根据类型绘制自定义形状
  nodeGroup.each(function(d) {
    const group = d3.select(this);
    applyCustomShape(group, d);
  });
  
  // 所有节点一律显示文字（优化后所有层级均显示名称）
  nodeGroup.append('text')
    .text(d => d.label)
    .attr('text-anchor', 'middle')
    .attr('dy', d => {
      const sz = TYPE_CONFIG[d.type]?.size || 8;
      return d.type === '成语' ? -sz-2 : sz + 3;
    })
    .attr('font-size', d => {
      const ord = TYPE_CONFIG[d.type]?.order || 7;
      if (ord <= 2) return 12;
      if (ord <= 4) return 10.5;
      if (ord === 5) return 9.5;
      if (ord === 6) return 9;
      return 8;
    })
    .attr('fill', '#e2e8f0')
    .attr('font-weight', d => TYPE_CONFIG[d.type]?.order <= 3 ? 'bold' : 'normal')
    .attr('stroke', '#0a0c10')
    .attr('stroke-width', 0.3)
    .attr('paint-order', 'stroke');
  
  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  });
  
  // 点击空白取消高亮
  svg.on('click', () => { clearHighlight(); document.getElementById('info-panel').style.display = 'none'; });
  
  setTimeout(() => { fitView(0); }, 1400);
}

// 高亮邻居节点
function highlightNode(nodeId) {
  clearHighlight();
  if (!nodeId) return;
  currentHighlightId = nodeId;
  const neighborSet = new Set([nodeId]);
  (adjMap[nodeId] || []).forEach(n => neighborSet.add(n.neighbor));
  g.selectAll('.node').classed('dimmed', d => !neighborSet.has(d.id));
  g.selectAll('.link').classed('dimmed', d => d.source.id !== nodeId && d.target.id !== nodeId);
}

function clearHighlight() {
  currentHighlightId = null;
  g.selectAll('.node').classed('dimmed', false);
  g.selectAll('.link').classed('dimmed', false);
}

// 自动定位并聚焦到目标节点（平滑移动）
function ensureNodeVisible(nodeData) {
  if (!nodeData || !nodeData.x || !nodeData.y) return;
  const transform = d3.zoomTransform(svg.node());
  const scale = transform.k;
  const width = window.innerWidth, height = window.innerHeight;
  // 计算需要的偏移，使节点位于视口中心
  const targetX = width/2 - nodeData.x * scale;
  const targetY = height/2 - nodeData.y * scale;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(targetX, targetY).scale(scale));
}

// 展示节点详情并自动定位
function showInfo(d) {
  const panel = document.getElementById('info-panel');
  const content = document.getElementById('info-content');
  const cfg = TYPE_CONFIG[d.type];
  const neighbors = adjMap[d.id] || [];
  const connectedHtml = neighbors.slice(0, 20).map(adj => {
    const n = GRAPH_DATA.nodes.find(node => node.id === adj.neighbor);
    if (!n) return '';
    const nc = TYPE_CONFIG[n.type];
    return `<div class="item" onclick="focusNodeById('${n.id}')">
      <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${nc?.color || '#aaa'};"></span>
      <strong>${n.label}</strong> <span style="color:#8b949e">[${n.type}]</span>
      <span class="rel-tag">${adj.rel}</span>
    </div>`;
  }).join('');
  
  let extra = '';
  if (d.latin) extra += `<p>🔬 <i>${d.latin}</i></p>`;
  if (d.pinyin) extra += `<p>📖 拼音: <span style="color:#f0c64a">${d.pinyin}</span></p>`;
  if (d.meaning) extra += `<div class="meaning-text">💬 ${d.meaning}</div>`;
  
  content.innerHTML = `
    <div class="type-badge" style="background:${cfg?.color}22; color:${cfg?.color}; border:1px solid ${cfg?.color}44">${d.type}</div>
    <h3 style="font-size:1.6rem; margin-bottom:6px;">🌿 ${d.label}</h3>
    ${extra}
    <div style="margin-top:16px;"><div style="font-weight:600; margin-bottom:8px;">🔗 关联节点 (${neighbors.length})</div>
    <div class="connected-list">${connectedHtml || '<span style="color:#8b949e">暂无其他关联</span>'}</div></div>
  `;
  panel.style.display = 'block';
}

// 全局定位函数供内部事件调用
window.focusNodeById = function(id) {
  const node = GRAPH_DATA.nodes.find(n => n.id === id);
  if (node) {
    showInfo(node);
    highlightNode(node.id);
    ensureNodeVisible(node);
  }
};

// 搜索与滚动定位
function onSearch(e) {
  const q = e.target.value.trim();
  const resultsDiv = document.getElementById('search-results');
  if (!q) { resultsDiv.innerHTML = ''; return; }
  const matched = GRAPH_DATA.nodes.filter(n => 
    n.label.includes(q) || (n.pinyin && n.pinyin.includes(q)) || (n.latin && n.latin.includes(q))
  ).slice(0, 12);
  resultsDiv.innerHTML = matched.map(n => {
    const cfg = TYPE_CONFIG[n.type];
    return `<div class="search-result" onclick="focusNodeById('${n.id}'); document.getElementById('search-results').innerHTML='';">
      ${n.label} <span style="background:${cfg?.color}33; color:${cfg?.color}; padding:2px 8px; border-radius:20px;">${n.type}</span>
    </div>`;
  }).join('');
}

function fitView(duration = 600) {
  if (!g.node()) return;
  const bounds = g.node().getBBox();
  if (!bounds.width) return;
  const width = window.innerWidth, height = window.innerHeight;
  const scale = 0.85 / Math.max(bounds.width / width, bounds.height / height);
  const tx = width/2 - scale * (bounds.x + bounds.width/2);
  const ty = height/2 - scale * (bounds.y + bounds.height/2);
  svg.transition().duration(duration).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function toggleType(type, el) {
  if (visibleTypes.has(type)) visibleTypes.delete(type);
  else visibleTypes.add(type);
  el.classList.toggle('hidden', !visibleTypes.has(type));
  renderGraph();
}

// 初始化所有UI及交互
function initUI() {
  if (!GRAPH_DATA) return;
  const typeCount = {};
  GRAPH_DATA.nodes.forEach(n => typeCount[n.type] = (typeCount[n.type] || 0) + 1);
  document.getElementById('stat-nodes').innerText = GRAPH_DATA.nodes.length;
  document.getElementById('stat-edges').innerText = GRAPH_DATA.edges.length;
  document.getElementById('stat-plants').innerText = typeCount['植物'] || 0;
  document.getElementById('stat-idioms').innerText = typeCount['成语'] || 0;
  
  const legendDiv = document.getElementById('legend');
  Object.entries(TYPE_CONFIG).forEach(([type, cfg]) => {
    const cnt = typeCount[type] || 0;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.type = type;
    item.innerHTML = `<div class="legend-dot" style="background:${cfg.color}"></div><span class="legend-label">${type}</span><span class="legend-count">${cnt}</span>`;
    item.addEventListener('click', () => toggleType(type, item));
    legendDiv.appendChild(item);
  });
  svg = d3.select('#graph-svg');
  zoom = d3.zoom().scaleExtent([0.08, 5]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  g = svg.append('g');
  
  renderGraph();
  document.getElementById('search-input').addEventListener('input', onSearch);
  document.getElementById('close-info').addEventListener('click', () => document.getElementById('info-panel').style.display = 'none');
  document.getElementById('btn-tax-only').addEventListener('click', () => {
    visibleTypes = new Set(['门','纲','亚纲','目','科','属']);
    document.querySelectorAll('.legend-item').forEach(el => el.classList.toggle('hidden', !visibleTypes.has(el.dataset.type)));
    renderGraph();
  });
  document.getElementById('btn-show-all').addEventListener('click', () => {
    visibleTypes = new Set(Object.keys(TYPE_CONFIG));
    document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('hidden'));
    renderGraph();
  });
  document.getElementById('btn-reset').addEventListener('click', () => fitView(600));
  document.getElementById('zoom-in').addEventListener('click', () => svg.transition().duration(150).call(zoom.scaleBy, 1.3));
  document.getElementById('zoom-out').addEventListener('click', () => svg.transition().duration(150).call(zoom.scaleBy, 0.75));
  document.getElementById('zoom-fit').addEventListener('click', () => fitView(500));
}

window.addEventListener('load', () => {
  if (typeof GRAPH_DATA !== 'undefined') initUI();
  else console.error('数据缺失');
});
</script>
</body>
